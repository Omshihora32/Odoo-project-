version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vendorbridge-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vendorbridge
      POSTGRES_PASSWORD: vendorbridge_secret
      POSTGRES_DB: vendorbridge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vendorbridge"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vendorbridge-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://vendorbridge:vendorbridge_secret@postgres:5432/vendorbridge
      JWT_SECRET: vendorbridge-jwt-secret-key-change-in-production
      JWT_EXPIRES_IN: 7d
      PORT: 5000
      CORS_ORIGIN: http://localhost:5173
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: noreply@vendorbridge.com
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vendorbridge-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
